name: Deploy UV Dashboard

on:
  push:
    branches:
      - main
    paths:
      - 'UV/**'
      - 'scripts/**'
      - 'index.html'
      - '.github/workflows/deploy-uv.yml'
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate persistent history
        env:
          TARGET_URL: https://coperlm.github.io/
          SITEMAP_URL: https://coperlm.github.io/sitemap.xml
          STATS_URL: https://vercount-l2e8.vercel.app/api/v2/stats
        run: |
          node scripts/update-history.mjs

      - name: Commit updated history
        run: |
          git config user.name "Vercount Bot"
          git config user.email "bot@vercount.io"
          if git diff --quiet -- UV/data/history.json; then
            echo "No history changes to commit"
          else
            git add UV/data/history.json
            git commit -m "chore: update UV history $(date -u +%Y-%m-%d)"
            git push origin HEAD:main
          fi

      - name: Prepare Pages artifact
        run: |
          mkdir -p dist/UV
          touch dist/.nojekyll
          cp index.html dist/index.html
          cp -R UV/. dist/UV/

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: gh-pages
          force_orphan: true
